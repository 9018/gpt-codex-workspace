<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><style>
:root{color-scheme:light dark}*{box-sizing:border-box}
body{font-family:system-ui,-apple-system,Segoe UI,sans-serif;margin:0;padding:8px;color:#1f2328;background:transparent}
.card{border:1px solid #d0d7de;border-radius:8px;padding:12px;max-width:720px;font-size:14px;line-height:1.5}
.section{margin-top:10px;padding-top:10px;border-top:1px solid #d0d7de}.section:first-child{margin-top:0;padding-top:0;border-top:none}
.title{font-weight:650;font-size:15px;margin-bottom:6px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.badge{display:inline-block;padding:1px 7px;border-radius:10px;font-size:11px;font-weight:600;vertical-align:middle}
.badge.ok,.badge.pass,.badge.completed,.badge.success,.badge.enabled,.badge.healthy,.badge.connected{background:#dafbe1;color:#1a7f37}
.badge.warn,.badge.warning,.badge.pending,.badge.queued,.badge.waiting,.badge.running,.badge.in_progress,.badge.ready,.badge.started{background:#fff8c5;color:#735c0f}
.badge.fail,.badge.failed,.badge.error,.badge.crashed,.badge.stopped,.badge.disabled,.badge.dirty,.badge.stale,.badge.missing,.badge.blocked{background:#ffebe9;color:#cf222e}
.badge.info,.badge.waiting_for_lock,.badge.waiting_for_review{background:#ddf4ff;color:#0969da}
.badge.cancelled,.badge.skipped,.badge.timeout,.badge.timed_out{background:#f6f8fa;color:#656d76}
.kv-table{width:100%;border-collapse:collapse;font-size:13px;margin:4px 0}.kv-table td{padding:2px 8px;vertical-align:top;line-height:1.4}
.kv-table td:first-child{color:#656d76;white-space:nowrap;width:30%}.kv-table tr:nth-child(odd){background:#f6f8fa}
.item-list{margin:6px 0;padding:0;list-style:none}.item-list li{padding:3px 8px;font-size:13px;border-left:3px solid #d0d7de;margin-bottom:3px;background:#f6f8fa;word-break:break-all}
.errors{margin:6px 0;padding:6px 10px;background:#fff0f0;border:1px solid #ffc0c0;border-radius:6px;font-size:13px;color:#cf222e}
.warnings{margin:6px 0;padding:6px 10px;background:#fff8e0;border:1px solid #e0c040;border-radius:6px;font-size:13px;color:#8a6d00}
.muted{color:#656d76;font-size:12px;margin-bottom:6px}
.fold-toggle{background:none;border:1px solid #d0d7de;border-radius:4px;padding:3px 8px;font-size:11px;cursor:pointer;color:#656d76;margin-top:4px}
.fold-toggle:hover{background:#f6f8fa}
pre.json{white-space:pre-wrap;font:11px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;background:#f6f8fa;border-radius:6px;padding:6px;overflow:auto;max-height:200px;margin-top:4px}
pre.json.collapsed{display:none}
pre.raw{white-space:pre-wrap;font:11px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;background:#f6f8fa;border-radius:6px;padding:6px;overflow:auto;max-height:240px;margin-top:4px;font-size:12px}
.diff-stat{margin:4px 0;font-size:12px;display:flex;gap:12px;flex-wrap:wrap}.diff-stat span{display:inline-flex;align-items:center;gap:3px}
.diff-add{color:#1a7f37}.diff-del{color:#cf222e}
@media(prefers-color-scheme:dark){:root{color-scheme:dark}
body{color:#e6edf3}.card{border-color:#30363d}
.badge.ok,.badge.pass,.badge.completed,.badge.success,.badge.enabled,.badge.healthy,.badge.connected{background:#0b5e1a;color:#3fb950}
.badge.warn,.badge.warning,.badge.pending,.badge.queued,.badge.waiting,.badge.running,.badge.in_progress,.badge.ready,.badge.started{background:#3d2e00;color:#d29922}
.badge.fail,.badge.failed,.badge.error,.badge.crashed,.badge.stopped,.badge.disabled,.badge.dirty,.badge.stale,.badge.missing,.badge.blocked{background:#490202;color:#ff7b72}
.badge.info,.badge.waiting_for_lock,.badge.waiting_for_review{background:#0c2d6b;color:#58a6ff}
.badge.cancelled,.badge.skipped,.badge.timeout,.badge.timed_out{background:#21262d;color:#8b949e}
.kv-table tr:nth-child(odd){background:#161b22}.item-list li{background:#161b22;border-left-color:#30363d}
pre.json,pre.raw{background:#161b22}
.fold-toggle{border-color:#30363d;color:#8b949e}.fold-toggle:hover{background:#21262d}
.errors{background:#3d0b0b;border-color:#792e2e;color:#ff7b72}.warnings{background:#3d2e00;border-color:#705000;color:#d29922}
.section,.section{border-top-color:#30363d}}
</style></head><body><div class="card" id="root"><div class="title">GPTWork</div><div class="muted">Loading...</div></div><script>
(function(){
var d = window.openai && (window.openai.toolOutput || window.openai.structuredContent) || {};
var root = document.getElementById('root');
function esc(s){return String(s).replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function badge(status){
  var s=String(status).toLowerCase().replace(/[^a-z0-9_]/g,'');
  var cls='info';
  if(/^(ok|pass|completed|success|enabled|healthy|connected|active|clean|true|running|loaded)$/.test(s)) cls='ok';
  else if(/^(warn|warning|pending|queued|waiting|ready|started|in_progress)$/.test(s)) cls='warn';
  else if(/^(fail|failed|error|crashed|stopped|disabled|dirty|stale|missing|blocked)$/.test(s)) cls='fail';
  else if(/^(cancelled|skipped|timeout|timed_out)$/.test(s)) cls='cancelled';
  return '<span class="badge '+cls+'">'+esc(status)+'</span>';
}
function renderCard(data){
  if(!data||typeof data!=='object'){return '<div class="muted">No data</div>'}
  var parts=[];
  var title=data.title||data.summary||data.name||'GPTWork Result';
  parts.push('<div class="section"><div class="title">'+esc(title));
  if(data.status) parts.push(' '+badge(data.status));
  parts.push('</div>');
  if(data.summary&&data.summary!==title) parts.push('<div class="muted">'+esc(data.summary)+'</div>');
  parts.push('</div>');
  var kv=data.keyValues||data.key_values||null;
  if(kv&&typeof kv==='object'){
    parts.push('<div class="section"><table class="kv-table">');
    if(Array.isArray(kv)){
      for(var i=0;i<kv.length;i++){var r=kv[i];parts.push('<tr><td>'+esc(r.key||r.k||'')+'</td><td>'+esc(r.value||r.v||'')+'</td></tr>')}
    }else{for(var k in kv){if(Object.prototype.hasOwnProperty.call(kv,k)){parts.push('<tr><td>'+esc(k)+'</td><td>'+esc(String(kv[k]))+'</td></tr>')}}}
    parts.push('</table></div>');
  }
  var items=data.items||data.list||null;
  if(items&&Array.isArray(items)&&items.length){
    parts.push('<div class="section"><ul class="item-list">');
    for(var i=0;i<items.length;i++){parts.push('<li>'+esc(String(items[i]))+'</li>')}
    parts.push('</ul></div>');
  }
  if(data.changed_files&&Array.isArray(data.changed_files)){
    parts.push('<div class="section"><div class="muted">Changed files: '+data.changed_files.length+(data.changed_files.length===1?' file':' files')+'</div>');
    parts.push('<ul class="item-list">');
    for(var i=0;i<Math.min(data.changed_files.length,20);i++){
      var f=data.changed_files[i];parts.push('<li>'+esc(f.path||String(f))+'</li>')
    }
    if(data.changed_files.length>20) parts.push('<li>... and '+(data.changed_files.length-20)+' more</li>');
    parts.push('</ul></div>');
  }
  if(data.staged_count!=null||data.unstaged_count!=null||data.total_changes!=null){
    parts.push('<div class="section"><div class="diff-stat">');
    if(data.staged_count!=null) parts.push('<span class="diff-add">+'+esc(data.staged_count)+' staged</span>');
    if(data.unstaged_count!=null) parts.push('<span class="diff-del">~'+esc(data.unstaged_count)+' unstaged</span>');
    if(data.total_changes!=null) parts.push('<span>'+esc(data.total_changes)+' changed</span>');
    parts.push('</div></div>');
  }
  if(data.diff_excerpt){
    var excerpt=data.diff_excerpt.slice(0,1200);
    parts.push('<div class="section"><div class="muted">Diff excerpt'+(data.diff_truncated?' (truncated)':'')+':</div>');
    parts.push('<pre class="raw">'+esc(excerpt)+'</pre></div>');
  }
  if(data.warnings&&Array.isArray(data.warnings)&&data.warnings.length){
    parts.push('<div class="section"><div class="warnings">'+data.warnings.map(function(w){return esc(typeof w==='string'?w:(w.message||w.code||String(w)))}).join('<br>')+'</div></div>');
  }
  if(data.errors&&Array.isArray(data.errors)&&data.errors.length){
    parts.push('<div class="section"><div class="errors">'+data.errors.map(function(e){return esc(typeof e==='string'?e:(e.message||e.code||String(e)))}).join('<br>')+'</div></div>');
  }
  var hasContent=data.status||data.summary||kv||(items&&items.length)||data.changed_files||data.errors||data.warnings||data.staged_count!=null||data.diff_excerpt;
  if(!hasContent){
    parts.push('<pre class="json">'+esc(JSON.stringify(data,null,2))+'</pre>');
  }else{
    var jsonStr=JSON.stringify(data,null,2);
    parts.push('<div class="section"><button class="fold-toggle" onclick="(function(b){var p=b.nextElementSibling;if(p){p.classList.toggle(\'collapsed\');b.textContent=p.classList.contains(\'collapsed\')?\'Show raw JSON\':\'Hide raw JSON\'}})(this)">Show raw JSON</button>');
    parts.push('<pre class="json collapsed">'+esc(jsonStr)+'</pre></div>');
  }
  return parts.join('');
}
root.innerHTML=renderCard(d);
})();
</script></body></html>
