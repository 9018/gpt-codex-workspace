<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><style>

.badge.fail,.badge.failed,.badge.error,.badge.crashed,.badge.stopped,.badge.disabled,.badge.dirty,.badge.stale,.badge.missing,.badge.blocked{background:#490202;color:#ff7b72}
.badge.info,.badge.waiting_for_lock,.badge.waiting_for_review{background:#0c2d6b;color:#58a6ff}.badge.cancelled,.badge.skipped,.badge.timeout,.badge.timed_out{background:#21262d;color:#8b949e}

.fold-toggle{border-color:#30363d;color:#8b949e}.fold-toggle:hover{background:#21262d}.errors{background:#3d0b0b;border-color:#792e2e;color:#ff7b72}.warnings{background:#3d2e00;border-color:#705000;color:#d29922}.section{border-top-color:#30363d}}
</style></head><body><div class="card" id="root"><section class="section"><div class="title">GPTWork Card <span class="badge info">loaded</span></div><p>GPTWork card loaded. Waiting for tool result...</p><p class="muted">resource loaded: ui://widget/gptwork-tool-card-v5.html</p></section></div><script>
(function(){
var RESOURCE_URI='ui://widget/gptwork-tool-card-v5.html';
var VERSION='gptwork-tool-card-v5';
var root=document.getElementById('root');
var renderCount=0;
var maxRenders=5;
var stopped=false;
var loadedAt=new Date().toISOString();
var lastEventAt='none';
var lastSource='fallback';
var lastPersistedHash='';
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function ownKeys(value){return value&&typeof value==='object'?Object.keys(value):[]}
function isObject(value){return value&&typeof value==='object'&&!Array.isArray(value)}

function compactClone(value){try{return JSON.parse(JSON.stringify(value))}catch(e){return value}}
function limitString(value,max){var s=String(value);return s.length>max?s.slice(0,max)+'...':s}
function compactSnapshot(data){
  if(!isObject(data)) return data;

  var keys=['summary','title','name','status','ok','gptwork_tool','gptwork_title','gptwork_type','keyValues','key_values','items','list','queue','worker','goal','task','item','warnings','errors','changed_files','staged_count','unstaged_count','total_changes','diff_truncated'];
  for(var i=0;i<keys.length;i++){var k=keys[i];if(data[k]!==undefined) out[k]=compactClone(data[k])}

  if(!ownKeys(out).length) out={summary:data.summary||data.title||data.name||'GPTWork result',status:data.status||''};
  var json=JSON.stringify(out);
  if(json&&json.length>16000){out={summary:data.summary||data.title||data.name||'GPTWork result',status:data.status||'',gptwork_tool:data.gptwork_tool||'',truncated:true}}
  return out;
}
function stableStringify(value){
  var seen=[];
  function normalize(v){
    if(v===null||typeof v!=='object') return v;
    if(seen.indexOf(v)>=0) return '[Circular]';
    seen.push(v);
    if(Array.isArray(v)){var arr=[];for(var i=0;i<v.length;i++) arr.push(normalize(v[i]));seen.pop();return arr}
    var out={};var keys=Object.keys(v).sort();
    for(var k=0;k<keys.length;k++){var key=keys[k];if(isVolatileKey(key)) continue;out[key]=normalize(v[key])}

  }
  try{return JSON.stringify(normalize(value))}catch(e){return String(value&&value.summary||value&&value.title||'')}
}
function isVolatileKey(key){return key==='savedAt'||key==='loadedAt'||key==='lastEventAt'||key==='renderCount'||key==='renders'||key==='timestamp'||key==='current_time'||key==='last_event_time'||key==='random_id'}
function identityString(value){
  var s=stableStringify(value);var h=0;
  for(var i=0;i<s.length;i++){h=((h<<5)-h+s.charCodeAt(i))|0}
  return ('00000000'+(h>>>0).toString(16)).slice(-8);
}
function payloadForHash(data){
  if(!isObject(data)) return data;
  var out={};var keys=Object.keys(data).sort();
  for(var i=0;i<keys.length;i++){var key=keys[i];if(isVolatileKey(key)||key.indexOf('gptwork_')===0) continue;out[key]=data[key]}
  return out;
}
function cardIdentity(data){
  if(!isObject(data)) return null;
  var tool=data.gptwork_tool||data.tool||data.name||'';
  var hash=data.gptwork_payload_hash||data.payload_hash||'';
  if(!hash&&tool) hash=identityString(payloadForHash(data));
  var instance=data.gptwork_card_instance_id||data.cardInstanceId||data.card_instance_id||'';
  if(!instance&&tool&&hash) instance=tool+':'+hash;
  if(!tool&&!hash&&!instance) return null;
  return {gptwork_tool:String(tool||''),gptwork_payload_hash:String(hash||''),gptwork_card_instance_id:String(instance||'')};
}
function identityKey(identity){return identity&&(identity.gptwork_card_instance_id||(identity.gptwork_tool&&identity.gptwork_payload_hash?identity.gptwork_tool+':'+identity.gptwork_payload_hash:''))}
function identitiesMatch(expected,data){
  var actual=cardIdentity(data);if(!expected||!actual) return false;
  var expectedKey=identityKey(expected);var actualKey=identityKey(actual);
  if(expectedKey&&actualKey&&expectedKey===actualKey) return true;
  if(expected.gptwork_tool&&actual.gptwork_tool&&expected.gptwork_tool!==actual.gptwork_tool) return false;
  if(expected.gptwork_payload_hash&&actual.gptwork_payload_hash&&expected.gptwork_payload_hash!==actual.gptwork_payload_hash) return false;
  return !!(expected.gptwork_tool&&actual.gptwork_tool&&expected.gptwork_payload_hash&&actual.gptwork_payload_hash);
}
function unwrapPayload(value){
  if(!value) return null;
  if(Array.isArray(value)){for(var i=value.length-1;i>=0;i--){var fromArray=unwrapPayload(value[i]);if(fromArray) return fromArray}return null}
  if(typeof value==='string') return {summary:value,status:'info'};
  if(!isObject(value)) return null;
  if(hasData(value.structuredContent)) return value.structuredContent;
  if(hasData(value.toolOutput)) return value.toolOutput;
  if(hasData(value.output)) return value.output;
  if(hasData(value.toolResult)) return value.toolResult;
  if(hasData(value.mcp_tool_result)) return unwrapPayload(value.mcp_tool_result);
  if(hasData(value.call_tool_result)) return unwrapPayload(value.call_tool_result);
  if(hasData(value.result)) return unwrapPayload(value.result)||value.result;
  if(hasData(value.data)) return unwrapPayload(value.data)||value.data;
  if(hasData(value.params)) return unwrapPayload(value.params)||value.params;
  if(Array.isArray(value.content)&&value.content.length){
    var texts=[];for(var c=0;c<value.content.length;c++){if(value.content[c]&&value.content[c].text) texts.push(value.content[c].text)}
    if(texts.length) return {summary:texts.join('\n'),status:'info'};
  }
  return hasData(value)?value:null;
}
function firstPayload(candidates){
  for(var i=0;i<candidates.length;i++){var payload=unwrapPayload(candidates[i]);if(payload&&hasData(payload))return payload}
  return null;
}
function readState(openai){return openai&&(openai.widgetState||openai.state||openai.savedState)}
function currentIdentityFromGlobals(openai,metadata){
  var current=firstPayload([openai&&openai.toolOutput,metadata&&metadata.mcp_tool_result&&metadata.mcp_tool_result.structuredContent,metadata&&metadata.call_tool_result,openai&&openai.structuredContent,openai&&(openai.output||openai.toolResult||openai.result)]);
  return cardIdentity(current);
}
function stateIdentity(state){return cardIdentity(state&&(state.currentCardIdentity||state.cardIdentity||state.expectedCardIdentity))}
function findPayloadFromState(state,expected){
  if(!state||!expected) return null;
  var key=identityKey(expected);
  var maps=[state.cardsByInstanceId,state.cardsByToolAndHash,state.cards,state.recentCards];
  for(var i=0;i<maps.length;i++){
    var map=maps[i];if(!isObject(map)||!key) continue;
    var fromMap=unwrapPayload(map[key]);
    if(fromMap&&hasData(fromMap)&&identitiesMatch(expected,fromMap)) return fromMap;
  }
  var legacy=unwrapPayload(state.lastToolResult||state.structuredContent||state.toolOutput);
  if(legacy&&hasData(legacy)&&identitiesMatch(expected,legacy)) return legacy;
  return null;
}
function findPayloadFromGlobals(){
  var openai=window.openai||{};
  var state=readState(openai);
  var metadata=openai.toolResponseMetadata||{};
  var candidates=[
    {source:'toolOutput',value:openai.toolOutput},
    {source:'toolResponseMetadata',value:metadata.mcp_tool_result&&metadata.mcp_tool_result.structuredContent},
    {source:'toolResponseMetadata',value:metadata.call_tool_result},
    {source:'structuredContent',value:openai.structuredContent},
    {source:'structuredContent',value:openai.output||openai.toolResult||openai.result},
    {source:'content',value:openai.content||metadata.content}
  ];
  if(Array.isArray(openai.messages)&&openai.messages.length){for(var i=openai.messages.length-1;i>=0;i--){candidates.push({source:'messages',value:openai.messages[i]})}}
  for(var j=0;j<candidates.length;j++){var payload=unwrapPayload(candidates[j].value);if(payload&&hasData(payload)) return {source:candidates[j].source,payload:payload}}
  var expected=currentIdentityFromGlobals(openai,metadata)||stateIdentity(state);
  var fromState=findPayloadFromState(state,expected);
  if(fromState) return {source:'widgetState',payload:fromState};
  return null;
}
function findPayloadFromEvent(data){
  var candidates=[data,data&&data.detail,data&&data.detail&&data.detail.toolOutput,data&&data.detail&&data.detail.toolResponseMetadata,data&&data.params,data&&data.params&&data.params.result,data&&data.result];
  var payload=firstPayload(candidates);
  return payload?{source:'event',payload:payload}:null;
}
function badge(status){
  var s=String(status).toLowerCase().replace(/[^a-z0-9_]/g,'');var cls='info';
  if(/^(ok|pass|completed|success|enabled|healthy|connected|active|clean|true|loaded)$/.test(s)) cls='ok';
  else if(/^(warn|warning|pending|queued|waiting|ready|started|running|in_progress)$/.test(s)) cls='warn';
  else if(/^(fail|failed|error|crashed|stopped|disabled|dirty|stale|missing|blocked|false)$/.test(s)) cls='fail';
  else if(/^(cancelled|skipped|timeout|timed_out)$/.test(s)) cls='cancelled';
  return '<span class="badge '+cls+'">'+esc(status)+'</span>';
}
function diagnostics(source){
  return '<div class="section"><div class="diag"><span>resource: '+esc(VERSION)+'</span><span>source: '+esc(source||lastSource)+'</span><span>renders: '+renderCount+'</span><span>loaded: '+esc(loadedAt)+'</span><span>last event: '+esc(lastEventAt)+'</span></div></div>';
}
function renderFallback(){
  var keys=ownKeys(window.openai).join(', ')||'(none)';
  return '<div class="section"><div class="title">GPTWork Card '+badge('loaded')+'</div><p>GPTWork card loaded. Waiting for tool result...</p><div class="muted">window.openai keys: '+esc(keys)+'</div></div>'+diagnostics('fallback');
}
function renderError(err){
  return '<div class="section"><div class="title">GPTWork Card '+badge('error')+'</div><div class="errors">Renderer error: '+esc(err&&err.message?err.message:err)+'</div></div>'+diagnostics('error');
}
function renderLoopPrevented(){
  return '<div class="section"><div class="title">GPTWork Card '+badge('blocked')+'</div><div class="errors">Render loop prevented.</div></div>'+diagnostics('blocked');
}
function renderCard(data,source){
  if(!isObject(data)) return renderFallback();
  var parts=[];var title=data.title||data.summary||data.name||data.gptwork_title||'GPTWork Result';
  parts.push('<div class="section"><div class="title">'+esc(title));
  if(data.status!==undefined) parts.push(' '+badge(data.status));
  else if(data.ok!==undefined) parts.push(' '+badge(data.ok?'ok':'error'));
  parts.push('</div>');
  if(data.summary&&data.summary!==title) parts.push('<div class="muted">'+esc(data.summary)+'</div>');
  parts.push('</div>');
  var kv=data.keyValues||data.key_values||null;
  if(kv&&typeof kv==='object'){
    parts.push('<div class="section"><table class="kv-table">');
    if(Array.isArray(kv)){for(var i=0;i<kv.length;i++){var r=kv[i]||{};parts.push('<tr><td>'+esc(r.key||r.k||'')+'</td><td>'+esc(r.value!==undefined?r.value:(r.v!==undefined?r.v:''))+'</td></tr>')}}
    else{for(var k in kv){if(Object.prototype.hasOwnProperty.call(kv,k)){parts.push('<tr><td>'+esc(k)+'</td><td>'+esc(String(kv[k]))+'</td></tr>')}}}
    parts.push('</table></div>');
  }
  var items=data.items||data.list||null;
  if(Array.isArray(items)&&items.length){parts.push('<div class="section"><ul class="item-list">');for(var a=0;a<items.length;a++){parts.push('<li>'+esc(String(items[a]))+'</li>')}parts.push('</ul></div>')}
  if(Array.isArray(data.changed_files)){parts.push('<div class="section"><div class="muted">Changed files: '+data.changed_files.length+(data.changed_files.length===1?' file':' files')+'</div><ul class="item-list">');for(var f=0;f<Math.min(data.changed_files.length,20);f++){var file=data.changed_files[f];parts.push('<li>'+esc(file&&file.path?file.path:String(file))+'</li>')}if(data.changed_files.length>20)parts.push('<li>... and '+(data.changed_files.length-20)+' more</li>');parts.push('</ul></div>')}
  if(data.staged_count!=null||data.unstaged_count!=null||data.total_changes!=null){parts.push('<div class="section"><div class="diff-stat">');if(data.staged_count!=null)parts.push('<span class="diff-add">+'+esc(data.staged_count)+' staged</span>');if(data.unstaged_count!=null)parts.push('<span class="diff-del">~'+esc(data.unstaged_count)+' unstaged</span>');if(data.total_changes!=null)parts.push('<span>'+esc(data.total_changes)+' changed</span>');parts.push('</div></div>')}
  if(data.diff_excerpt){parts.push('<div class="section"><div class="muted">Diff excerpt'+(data.diff_truncated?' (truncated)':'')+':</div><pre class="raw">'+esc(limitString(data.diff_excerpt,1200))+'</pre></div>')}
  if(Array.isArray(data.warnings)&&data.warnings.length){parts.push('<div class="section"><div class="warnings">'+data.warnings.map(function(w){return esc(typeof w==='string'?w:(w.message||w.code||String(w)))}).join('<br>')+'</div></div>')}
  if(Array.isArray(data.errors)&&data.errors.length){parts.push('<div class="section"><div class="errors">'+data.errors.map(function(e){return esc(typeof e==='string'?e:(e.message||e.code||String(e)))}).join('<br>')+'</div></div>')}
  var hasContent=data.status!==undefined||data.ok!==undefined||data.summary||kv||(items&&items.length)||data.changed_files||data.errors||data.warnings||data.staged_count!=null||data.diff_excerpt;
  var jsonStr=stableStringify(data);
  if(!hasContent){parts.push('<pre class="json">'+esc(jsonStr)+'</pre>')}
  else{parts.push('<div class="section"><button class="fold-toggle" onclick="(function(b){var p=b.nextElementSibling;if(p){p.classList.toggle(\'collapsed\');b.textContent=p.classList.contains(\'collapsed\')?\'Show raw JSON\':\'Hide raw JSON\'}})(this)">Show raw JSON</button><pre class="json collapsed">'+esc(jsonStr)+'</pre></div>')}
  parts.push(diagnostics(source));
  return parts.join('');
}
function saveWidgetState(payload,source){
  return;
}
function renderFrom(found){
  if(stopped) return;
  if(renderCount>=maxRenders){stopped=true;root.innerHTML=renderLoopPrevented();return;}
  try{
    renderCount++;
    if(found&&found.payload){lastSource=found.source||'unknown';root.innerHTML=renderCard(found.payload,lastSource);saveWidgetState(found.payload,lastSource)}
    else{lastSource='fallback';root.innerHTML=renderFallback()}
  }catch(err){renderCount++;stopped=true;root.innerHTML=renderError(err)}
}
function hydrate(){renderFrom(findPayloadFromGlobals())}
try{hydrate()}catch(err){renderCount++;stopped=true;root.innerHTML=renderError(err)}
})();
</script></body></html>
