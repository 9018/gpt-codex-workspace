name: Release Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-gate:
    env:
      GPTWORK_TOOL_MODE: full
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Syntax check
        working-directory: backend
        run: npm run check:syntax

      - name: Import check
        working-directory: backend
        run: npm run check:imports

      - name: Release gate
        working-directory: backend
        run: npm run release:gate

      - name: Delivery check (full profile)
        working-directory: backend
        run: npm run release:delivery-check -- --profile full --json-report .gptwork/releases/delivery-check-report.json

      - name: Upload delivery check report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: delivery-check-report
          path: backend/.gptwork/releases/delivery-check-report.json
          if-no-files-found: ignore
